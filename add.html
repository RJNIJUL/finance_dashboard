<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Transaction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 10px 0;
        }
        .sidebar a:hover {
            color: white;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>💰 Finance</h4>
            <hr>
            <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#"><i class="bi bi-plus-circle"></i> Add Transaction</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-5">

            <div class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">

                <h4 class="mb-4">➕ Add New Transaction</h4>

                <form method="POST">

                    <!-- TYPE -->
                    <div class="mb-3">
                        <label class="form-label">Transaction Type</label>
                        <select name="type" class="form-select" required>
                            <option value="">Select Type</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>

                    <!-- AMOUNT -->
                    <div class="mb-3">
                        <label class="form-label">Amount (₹)</label>
                        <input type="number" name="amount" class="form-control" placeholder="Enter amount" min="1" step="0.01" required>
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select" required>
                            <option value="">Select Category</option>

                            <optgroup label="Expense">
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Bills">Bills</option>
                                <option value="Entertainment">Entertainment</option>
                            </optgroup>

                            <optgroup label="Income">
                                <option value="Salary">Salary</option>
                                <option value="Freelance">Freelance</option>
                                <option value="Business">Business</option>
                                <option value="Other Income">Other Income</option>
                            </optgroup>
                        </select>
                    </div>

                    <!-- BUTTON -->
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark">Add Transaction</button>
                    </div>

                </form>

                <!-- BACK -->
                <div class="text-center mt-3">
                    <a href="/" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
