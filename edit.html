<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Transaction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 10px 0;
        }
        .sidebar a:hover {
            color: white;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>💰 Finance</h4>
            <hr>
            <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/add"><i class="bi bi-plus-circle"></i> Add Transaction</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-5">

            <div class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">

                <h4 class="mb-4">✏️ Edit Transaction</h4>

                <form method="POST">

                    <!-- TYPE -->
                    <div class="mb-3">
                        <label class="form-label">Transaction Type</label>
                        <select name="type" class="form-select" required>
                            <option value="income" {% if t.type == 'income' %}selected{% endif %}>Income</option>
                            <option value="expense" {% if t.type == 'expense' %}selected{% endif %}>Expense</option>
                        </select>
                    </div>

                    <!-- AMOUNT -->
                    <div class="mb-3">
                        <label class="form-label">Amount (₹)</label>
                        <input type="number" name="amount" class="form-control"
                               value="{{ t.amount }}" min="1" step="0.01" required>
                    </div>

                    <!-- CATEGORY -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select" required>

                            <optgroup label="Expense">
                                <option value="Food" {% if t.category == 'Food' %}selected{% endif %}>Food</option>
                                <option value="Travel" {% if t.category == 'Travel' %}selected{% endif %}>Travel</option>
                                <option value="Shopping" {% if t.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                                <option value="Bills" {% if t.category == 'Bills' %}selected{% endif %}>Bills</option>
                                <option value="Entertainment" {% if t.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                            </optgroup>

                            <optgroup label="Income">
                                <option value="Salary" {% if t.category == 'Salary' %}selected{% endif %}>Salary</option>
                                <option value="Freelance" {% if t.category == 'Freelance' %}selected{% endif %}>Freelance</option>
                                <option value="Business" {% if t.category == 'Business' %}selected{% endif %}>Business</option>
                                <option value="Other Income" {% if t.category == 'Other Income' %}selected{% endif %}>Other Income</option>
                            </optgroup>

                        </select>
                    </div>

                    <!-- BUTTON -->
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark">Update Transaction</button>
                    </div>

                </form>

                <!-- BACK -->
                <div class="text-center mt-3">
                    <a href="/" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
