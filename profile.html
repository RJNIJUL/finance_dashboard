<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - Finance Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 10px 0;
        }
        .sidebar a:hover {
            color: white;
        }
        .card {
            border-radius: 12px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>💰 Finance</h4>
            <hr>
            <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/add"><i class="bi bi-plus-circle"></i> Add Transaction</a>
            <a href="/profile"><i class="bi bi-person"></i> Profile</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-4">

            <h3 class="mb-4">👤 Profile</h3>

            <div class="row">

                <!-- LEFT: PROFILE CARD -->
                <div class="col-md-4">
                    <div class="card p-4 shadow-sm text-center">

                        <!-- IMAGE -->
                        {% if user.image %}
                            <img src="{{ url_for('static', filename='uploads/' + user.image) }}" 
                                 class="rounded-circle profile-img mb-3">
                        {% else %}
                            <img src="https://via.placeholder.com/120" 
                                 class="rounded-circle profile-img mb-3">
                        {% endif %}

                        <h5>{{ user.username }}</h5>

                        <!-- UPLOAD FORM -->
                        <form method="POST" action="/upload" enctype="multipart/form-data" class="mt-3">
                            <input type="file" name="image" class="form-control mb-2" required>
                            <button class="btn btn-dark w-100 btn-sm">Upload Photo</button>
                        </form>

                    </div>
                </div>

                <!-- RIGHT: STATS -->
                <div class="col-md-8">

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <div class="card p-3 shadow-sm">
                                <small>Total Income</small>
                                <h4 class="text-success">₹{{ income }}</h4>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card p-3 shadow-sm">
                                <small>Total Expense</small>
                                <h4 class="text-danger">₹{{ expense }}</h4>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card p-3 shadow-sm">
                                <small>Balance</small>
                                <h4 class="text-primary">₹{{ balance }}</h4>
                            </div>
                        </div>
                    </div>

                    <!-- ACTIONS -->
                    <div class="card p-4 shadow-sm">

                        <h5 class="mb-3">Account Settings</h5>

                        <div class="d-flex gap-2 flex-wrap">
                            <a href="/change_password" class="btn btn-warning">
                                <i class="bi bi-key"></i> Change Password
                            </a>

                            <a href="/logout" class="btn btn-danger">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </a>

                            <a href="/" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
